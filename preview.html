<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Details | Glamour</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        :root {
            --glam-gold: #dbb445;
            --glam-dark: #000000;
            --glam-card: #0a0a0a;
            --glam-glass: rgba(255, 255, 255, 0.05);
            --text-muted: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--glam-dark);
            color: #ffffff;
            margin: 0;
            padding-bottom: 40px;
        }

        .wrapper { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* --- CONFIRM DETAILS SECTION --- */
        .confirm-container {
            background: var(--glam-card);
            border: 1px solid var(--glam-glass);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .confirm-title { color: #5eead4; font-weight: 800; text-align: center; font-size: 22px; margin-bottom: 5px; }
        .confirm-subtitle { color: #aaa; text-align: center; font-size: 13px; margin-bottom: 25px; }

        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .detail-label { color: #888; font-size: 14px; }
        .detail-value { color: #fff; font-weight: 600; font-size: 14px; }

        /* --- PLAN CARD --- */
        .plan-card {
            background: var(--glam-card);
            border: 2px solid var(--glam-gold);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .plan-name { font-size: 20px; font-weight: 800; color: var(--glam-gold); margin-bottom: 5px; }
        .plan-price { font-size: 32px; font-weight: 900; margin: 15px 0; }
        
        .benefit-list { text-align: left; margin: 20px 0; list-style: none; padding: 0; }
        .benefit-list li { font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; color: #ddd; }
        .benefit-list li i { color: var(--glam-gold); }

        .btn-pay {
            background: var(--glam-gold); color: #000; border: none;
            width: 100%; padding: 16px; border-radius: 15px;
            font-weight: 800; font-size: 16px; text-transform: uppercase;
        }
        /* Popup Notification Styling */
.signup-toast {
    position: fixed;
    bottom: 20px;
    left: -400px; /* Hidden by default */
    background: #111;
    border: 1px solid var(--glam-gold);
    padding: 15px 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 9999;
    transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

.signup-toast.show {
    left: 20px;
}

.toast-img {
    width: 40px;
    height: 40px;
    background: var(--glam-gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-weight: 800;
}

.toast-content {
    font-size: 13px;
}

.toast-user {
    display: block;
    font-weight: 800;
    color: var(--glam-gold);
}

.toast-time {
    font-size: 11px;
    color: #666;
}
    </style>
</head>
<body>

<div class="wrapper">
    <div class="confirm-container">
        <h2 class="confirm-title">CONFIRM DETAILS</h2>
        <p class="confirm-subtitle">Almost there! Review your details before activating your account.</p>
        
        <div class="detail-row">
            <span class="detail-label">Name:</span>
            <span class="detail-value" id="display-name">---</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Username:</span>
            <span class="detail-value" id="display-user">---</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Country:</span>
            <span class="detail-value" id="display-country">---</span>
        </div>
    </div>

    <div class="plan-card">
        <span class="plan-name">GLAM-PREMIUM PACKAGE</span>
        <div class="plan-price" id="dynamic-price">---</div>
        
        <ul class="benefit-list">
            <li id="bonus-text"><i class="fa fa-check-circle"></i> Instant Welcome Bonus</li>
            <li><i class="fa fa-check-circle"></i> Daily Tap & Earn Task Access</li>
            <li><i class="fa fa-check-circle"></i> Priority Withdrawal Approval</li>
        </ul>

        <a href="payment.html"><button class="btn-pay">Pay & Activate Now</button></a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Get data from LocalStorage
    const name = localStorage.getItem('glamour_fullname') || "Guest";
    const user = localStorage.getItem('glamour_username') || "@user";
    const country = localStorage.getItem('glamour_country') || "Nigeria";

    // 2. Display the user's data
    document.getElementById('display-name').innerText = name;
    document.getElementById('display-user').innerText = "@" + user.replace('@', '');
    document.getElementById('display-country').innerText = country;

    // 3. Set Currency and Amount based on country
    const priceElement = document.getElementById('dynamic-price');
    const bonusText = document.getElementById('bonus-text');

    const pricing = {
        'Nigeria': { price: '₦14,000', bonus: '₦10,000' },
        'Ghana': { price: '250 GHS', bonus: '180 GHS' },
        'Cameroon': { price: '14,000 XAF', bonus: '10,000 XAF' }
    };

    const setup = pricing[country] || pricing['Nigeria']; // Default to Nigeria if something goes wrong

    priceElement.innerText = setup.price;
    bonusText.innerHTML = `<i class="fa fa-check-circle"></i> Instant ${setup.bonus} Welcome Bonus`;
});

document.addEventListener('DOMContentLoaded', () => {
    const toast = document.getElementById('signup-toast');
    const toastUser = document.getElementById('toast-user');
    const toastMsg = document.getElementById('toast-msg');

    // Safety check: only run if the elements exist on this page
    if (!toast || !toastUser || !toastMsg) return;

    const fakeSignups = [
        { name: "Chinedu_99", country: "Nigeria", action: "earned ₦45,000" },
        { name: "Kofi_GHS", country: "Ghana", action: "activated Premium" },
        { name: "Etoo_Fils", country: "Cameroon", action: "withdrew 20,000 XAF" },
        { name: "Salami_Vibe", country: "Nigeria", action: "got Welcome Bonus" },
        { name: "Ama_Joy", country: "Ghana", action: "earned 150 GHS" }
    ];

    function showNotification() {
        const randomData = fakeSignups[Math.floor(Math.random() * fakeSignups.length)];
        
        toastUser.innerText = `${randomData.name} (${randomData.country})`;
        toastMsg.innerText = randomData.action;

        toast.classList.add('show');

        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    // Start loop
    setTimeout(() => {
        showNotification();
        setInterval(showNotification, 10000);
    }, 3000);
});

</script>
<div id="signup-toast" class="signup-toast">
    <div class="toast-img"><i class="fa fa-user"></i></div>
    <div class="toast-content">
        <span class="toast-user" id="toast-user">Prince_K</span>
        <span id="toast-msg">Just activated Glam-Premium!</span>
        <div class="toast-time" id="toast-time">2 minutes ago</div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment | Glamour</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #dbb445; --dark: #000; --card: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 20px; text-align: center; }
        
        .payment-box { max-width: 450px; margin: 40px auto; background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; padding: 30px; }
        
        .narrator-box { background: rgba(219, 180, 69, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px dashed var(--gold); }
        .username-text { color: var(--gold); font-weight: 900; text-transform: uppercase; }

        .amount-display { font-size: 32px; font-weight: 900; margin: 20px 0; color: #fff; }
        
        .instruction { color: #888; font-size: 14px; margin-bottom: 20px; }

        .pay-detail-row { background: #111; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .label { color: #666; font-size: 12px; text-transform: uppercase; font-weight: 700; }
        .value { color: #fff; font-weight: 700; }

        .copy-icon { color: var(--gold); cursor: pointer; margin-left: 10px; }

        .done-btn { background: var(--gold); color: #000; width: 100%; border: none; padding: 18px; border-radius: 15px; font-weight: 900; text-transform: uppercase; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="payment-box">
        <div class="narrator-box">
            👋 Welcome, <span class="username-text" id="user-name">User</span>!
        </div>

        <p class="instruction">Make payment for your account activation</p>
        <div class="amount-display" id="total-amt">---</div>

        <div class="pay-detail-row">
            <div>
                <div class="label">Payment Reference</div>
                <div class="value" id="ref-code">GLAM-77329</div>
            </div>
            <i class="fa-regular fa-copy copy-icon" onclick="copy('ref-code')"></i>
        </div>

        <div class="pay-detail-row">
            <div>
                <div class="label">Narration / Remark</div>
                <div class="value" id="narrator">User_Activation</div>
            </div>
            <i class="fa-regular fa-copy copy-icon" onclick="copy('narrator')"></i>
        </div>

        <p style="font-size: 12px; color: #555; margin-top: 20px;">Ensure you use your <b>Username</b> as the payment narration to speed up approval.</p>

        <button class="done-btn" onclick="alert('Verification in progress...')">I Have Made Payment</button>
    </div>

    <script>
        // Get data from URL
        const params = new URLSearchParams(window.location.search);
        const user = params.get('user') || "Member";
        const amt = params.get('amount') || "14000";
        const country = params.get('country') || "Nigeria";

        // Map Currency symbols
        const currencyMap = { 'Nigeria': '₦', 'Ghana': 'GHS ', 'Cameroon': 'XAF ' };
        const symbol = currencyMap[country] || '₦';

        // Update Page
        document.getElementById('user-name').innerText = user;
        document.getElementById('total-amt').innerText = symbol + parseInt(amt).toLocaleString();
        document.getElementById('narrator').innerText = user + "_GLAM";

        // Copy Function
        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Copied: " + text);
        }
    </script>
</body>
</html>
